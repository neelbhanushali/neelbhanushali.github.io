	<script type="text/javascript">

		$(document).ready(function() {
			// inits
			$('.button-collapse').sideNav();
			$('.scrollspy').scrollSpy();
			$('select').material_select();
			select_init();
		});


		function ID(x) { return document.getElementById(x); }

		function select_init() {
			$("select").parent().find("li").attr("onclick","select_update(this)");
		}

		function select_update(li) {
			var a = li.parentNode.getElementsByClassName("active")[0].children[0];
			var select = li.parentNode.parentNode.getElementsByTagName("select")[0];
			var options = select.children;
			for(var i = 0; i < options.length; i++)
				if(options[i].innerHTML == a.innerHTML ) 
					options[i].setAttribute("selected","selected");
				else 
					options[i].removeAttribute("selected");
		}

		

		//scroll eventlistener
		window.addEventListener("scroll", function() {
			if(window.scrollY >= 369)
				document.getElementById("gototopbtn").classList.remove("hide");
			else
				document.getElementById("gototopbtn").classList.add("hide");
		});

		//body onload event
		// document.body.setAttribute("onload", "hidePreloader()");

		//preloader fns
		function hidePreloader() { 
			setTimeout(function() {
				document.getElementById("preloader").style.display = "none"; 
			}, 690);
		}
		function showPreloader(el) { document.getElementById("preloader").style.display = "block"; }

		//go to links when clicked on social icons
		$(".social i[data-url]").on("click",function() {
			document.location = $(this).attr("data-url");
		});

		//email href changer
		if(window.innerWidth <= 992) {
			document.getElementsByClassName("email")[0].children[0].href = "mailto:neal.bhanushali@gmail.com";
		}
