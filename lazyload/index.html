	<script type="text/javascript">
		function _qsa(x) { return document.querySelectorAll(x); }
		function _id(x) { return document.getElementById(x); }
		function _el(x) { return document.createElement(x); }
		function lazyloading() {
			var img = _qsa("img.lazyload");
			for (var i = 0; i < img.length; i++) {
				var scrollPos = window.scrollY + window.innerHeight * 5;
				var imgPos = img[i].offsetTop;
				if (scrollPos >= imgPos && img[i].getAttribute("src") == "") {
					var a = new Image();
					a.src = img[i].getAttribute("data-src");
					a.setAttribute("onload", "showIMG(this)");
					a.setAttribute("onerror", "IMGerror(this)");
					_id("lazyload").appendChild(a);
					img[i].src = "__.gif";
				}
			}
		}

		window.addEventListener("scroll", lazyloading);

		function showIMG(el) {
			var img = _qsa("img[data-src='" + el.src + "']");
			for (var i = 0; i < img.length; i++) {
				img[i].src = img[i].getAttribute("data-src");
				img[i].style.animation = "fadeIn 1s linear";
			}
		}

		function IMGerror(el) {
			var img = _qsa("img[data-src='" + el.src + "']");
			for (var i = 0; i < img.length; i++) {
				img[i].alt = "Error loading image";
			}
		}
	</script>
